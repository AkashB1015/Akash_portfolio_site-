<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Theme Initializer -->
    <script>
      (function() {
        const stored = localStorage.getItem('theme');
        if (stored === 'dark' || (!stored && !window.matchMedia('(prefers-color-scheme: light)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO Meta Tags -->
    <title>Akash Bhadane | Portfolio</title>
    <meta name="description" content="Portfolio of Akash Bhadane, a CDAC-trained Software Engineer specializing in Java/Spring Boot, C#/.NET Core, and React.js. Building scalable and secure systems." />
    <meta name="keywords" content="Akash Bhadane, Software Engineer, Full Stack Developer, Java, Spring Boot, ASP.NET Core, React, MERN, CDAC, Portfolio" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Akash Bhadane | Portfolio" />
    <meta property="og:description" content="Portfolio of Akash Bhadane, a CDAC-trained Software Engineer specializing in Java/Spring Boot, C#/.NET Core, and React.js." />
    
    <!-- Google Fonts Connection -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical font subsets to unblock first paint text rendering.
         Inter 400 (body) and Outfit 700 (hero headline) are the highest priority. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://fonts.gstatic.com/s/inter/v13/UcCO3FwrK3iLTeHuS_fvQtMwCp50KnMw2boKoduKmMEVuLyfAZ9hiJ-Ek-_EeA.woff2"
      crossorigin
    />
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="https://fonts.gstatic.com/s/outfit/v11/QGYyz_MVcBeNP4NjuGObqx1XmO1I4TC1C4G-EiAou6Y.woff2"
      crossorigin
    />

    <!-- Full font family load with display=swap so text is never invisible -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  </head>
  <body class="font-body antialiased selection:bg-accent-blue/30 selection:text-ink-100 overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
